{% load tailwind_cli %}
{% load static %}
<!doctype html>
<html lang="en" x-data="{ darkMode: JSON.parse(localStorage.getItem('darkMode')) }" :class="{'dark': darkMode === true}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Expired | Hotel SaaS</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% tailwind_css %}
</head>
<body class="flex items-center justify-center h-screen px-4 bg-gray-50 dark:bg-gray-900">
    
    <div class="w-full max-w-md p-8 text-center bg-white border border-gray-200 shadow-lg dark:bg-gray-800 rounded-2xl dark:border-gray-700">
        
        <div class="flex items-center justify-center w-16 h-16 mx-auto mb-6 text-red-600 bg-red-100 rounded-full dark:bg-red-900/30 dark:text-red-500">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        
        <h2 class="mb-2 text-2xl font-bold text-gray-900 dark:text-white">Payment Required</h2>
        
        <p class="mb-6 text-sm text-gray-500 dark:text-gray-400">
            আপনার হোটেলের সাবস্ক্রিপশনের মেয়াদ শেষ হয়ে গেছে অথবা পেমেন্ট বাকি আছে। ড্যাশবোর্ড ব্যবহার চালিয়ে যেতে অনুগ্রহ করে পেমেন্ট ক্লিয়ার করুন।
        </p>
        
        <div class="flex flex-col gap-3">
            <button class="w-full py-2.5 font-medium text-white transition-colors bg-blue-600 rounded-lg hover:bg-blue-700">
                Pay Now / Upgrade
            </button>
            <a href="{% url 'admin:index' %}" class="w-full py-2.5 font-medium text-gray-700 transition-colors bg-gray-100 rounded-lg dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 dark:text-gray-300">
                Contact Support
            </a>
        </div>
        
    </div>

</body>
</html>
